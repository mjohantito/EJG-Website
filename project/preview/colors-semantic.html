<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Semantic</title>
<style>
  body { padding: 20px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .sw { border-radius: 14px; padding: 12px; height: 120px; display: flex; flex-direction: column; justify-content: space-between; color: #fff; }
  .label { font-family: var(--font-display); font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.85; }
  .n { font-family: var(--font-display); font-weight: 800; font-size: 17px; }
  .meta { font-family: var(--font-mono); font-size: 10px; opacity: 0.85; }
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background: #3E7A35;"><span class="label">Success</span><div class="n">Sip, aman</div><div class="meta">#3E7A35</div></div>
    <div class="sw" style="background: #F3D543; color: var(--ejg-ink);"><span class="label" style="opacity:0.9">Warning</span><div class="n">Hati-hati</div><div class="meta">#F3D543</div></div>
    <div class="sw" style="background: #C23B2A;"><span class="label">Danger</span><div class="n">Waduh</div><div class="meta">#C23B2A</div></div>
    <div class="sw" style="background: #2D6B88;"><span class="label">Info</span><div class="n">FYI</div><div class="meta">#2D6B88</div></div>
  </div>
</body></html>
