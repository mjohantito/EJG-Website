<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Type · Expression</title>
<style>
  body { padding: 24px 28px; gap: 14px; }
  .quote { font-family: var(--font-display); font-style: italic; font-weight: 500; font-size: 26px; line-height: 1.25; color: var(--ejg-ink); max-width: 600px; background: linear-gradient(transparent 65%, var(--ejg-matahari) 65%); padding: 0 4px; width: fit-content; }
  .attr { font-family: var(--font-display); font-size: 12px; font-weight: 600; color: var(--fg-3); letter-spacing: 0.02em; }
  .tag-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .tag { font-family: var(--font-display); font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; padding: 5px 10px; border-radius: 999px; }
  .t-sun { background: var(--ejg-matahari); color: var(--ejg-ink); border: 2px solid var(--ejg-ink); padding: 3px 10px; }
  .t-ink { background: var(--ejg-ink); color: var(--ejg-kertas); }
  .t-out { background: #fff; color: var(--ejg-ink); border: 2px solid var(--ejg-ink); padding: 3px 10px; }
  .t-kertas { background: var(--ejg-kertas-2); color: var(--ejg-ink); }
</style></head>
<body>
  <div class="quote">Eh beneran jadi ga sih?</div>
  <div class="attr">— Grup chat, 2 minggu sebelum hari-H</div>
  <div class="tag-row">
    <span class="tag t-ink">PRIVATE TRIP</span>
    <span class="tag t-sun">OPEN TRIP</span>
    <span class="tag t-out">GLAMPING</span>
    <span class="tag t-kertas">CORPORATE</span>
  </div>
</body></html>
