<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Brand DNA</title>
<style>
  body { padding: 28px; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .brand-line { font-family: var(--font-display); font-weight: 800; font-size: 46px; letter-spacing: -0.02em; line-height: 1; color: var(--ejg-ink); }
  .brand-sub { font-family: var(--font-display); font-style: italic; font-weight: 500; font-size: 17px; color: var(--fg-3); max-width: 560px; line-height: 1.4; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 2px; }
  .tag { font-family: var(--font-display); font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 6px 10px; border-radius: 999px; border: 1px solid var(--border); color: var(--ejg-ink); background: #fff; }
  .tag.sun { background: var(--ejg-matahari); border-color: var(--ejg-matahari); }
  .tag.ink { background: var(--ejg-ink); border-color: var(--ejg-ink); color: var(--ejg-kertas); }
</style></head>
<body>
  <div class="stack">
    <div class="brand-line">EH! JADI GA?</div>
    <div class="brand-sub">"Hey — are we actually going or not?" That spark right before a group chat finally commits to a trip. That is the brand.</div>
    <div class="tags">
      <span class="tag sun">Humble</span>
      <span class="tag ink">Playful</span>
      <span class="tag">Professional</span>
      <span class="tag">Mobile-first</span>
      <span class="tag">Gen Z</span>
      <span class="tag">Bahasa-first</span>
    </div>
  </div>
</body></html>
