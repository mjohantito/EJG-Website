<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Buttons · Primary</title>
<style>
  body { padding: 24px; gap: 14px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .btn { font-family: var(--font-display); font-weight: 700; font-size: 15px; border: none; cursor: pointer; border-radius: 14px; padding: 13px 22px; display: inline-flex; align-items: center; gap: 8px; transition: all 200ms cubic-bezier(0.22,1,0.36,1); letter-spacing: 0.01em; }
  .pri { background: #252525; color: #F3D543; }
  .pri.hover { background: #000; color: #F3D543; transform: translateY(-1px); box-shadow: 0 10px 22px rgba(0,0,0,0.3); }
  .pri.press { background: #000; color: #F3D543; transform: scale(0.97); }
  .pri.dis  { background: var(--ejg-fog); color: var(--ejg-stone); cursor: not-allowed; }
  .acc { background: var(--ejg-matahari); color: var(--ejg-ink); border: 2px solid var(--ejg-ink); box-shadow: 4px 4px 0 var(--ejg-ink); }
  .lbl { font-family: var(--font-display); font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); }
</style></head>
<body>
  <div class="lbl">Primary · Ink</div>
  <div class="row">
    <button class="btn pri">Pesan sekarang</button>
    <button class="btn pri hover">Pesan sekarang</button>
    <button class="btn pri press">Pesan sekarang</button>
    <button class="btn pri dis">Pesan sekarang</button>
  </div>
  <div class="lbl">Accent · Matahari (1 per page)</div>
  <div class="row">
    <button class="btn acc">Jalan, yuk →</button>
  </div>
</body></html>
