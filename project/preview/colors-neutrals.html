<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Neutrals</title>
<style>
  body { padding: 20px; }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
  .sw { border-radius: 14px; padding: 12px; height: 140px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid rgba(0,0,0,0.04); }
  .sw .n { font-family: var(--font-display); font-weight: 700; font-size: 12px; letter-spacing: -0.005em; }
  .sw .h { font-family: var(--font-mono); font-size: 10px; opacity: 0.7; }
  .dark { color: var(--ejg-kertas); }
  .light { color: var(--ejg-ink); }
</style></head>
<body>
  <div class="row">
    <div class="sw light" style="background: #FFFFFF;"><span class="n">putih</span><span class="h">#FFFFFF</span></div>
    <div class="sw light" style="background: #EEEAE2;"><span class="n">kertas</span><span class="h">#EEEAE2</span></div>
    <div class="sw light" style="background: #E3DDD0;"><span class="n">kertas-2</span><span class="h">#E3DDD0</span></div>
    <div class="sw light" style="background: #DDD6C8;"><span class="n">fog</span><span class="h">#DDD6C8</span></div>
    <div class="sw dark" style="background: #7A756B;"><span class="n">stone</span><span class="h">#7A756B</span></div>
    <div class="sw dark" style="background: #252525;"><span class="n">ink</span><span class="h">#252525</span></div>
  </div>
</body></html>
