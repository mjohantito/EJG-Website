<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Buttons · Secondary</title>
<style>
  body { padding: 24px; gap: 14px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .btn { font-family: var(--font-display); font-weight: 600; font-size: 15px; cursor: pointer; border-radius: 14px; padding: 12px 20px; display: inline-flex; align-items: center; gap: 8px; }
  .sec { background: #fff; color: var(--ejg-ink); border: 1.5px solid var(--ejg-ink); }
  .ghost { background: transparent; color: var(--ejg-ink); border: 1.5px solid var(--border-strong); }
  .link { background: transparent; color: var(--ejg-ink); border: none; text-decoration: underline; text-decoration-thickness: 1.5px; text-underline-offset: 3px; padding: 6px 0; }
  .sm { font-size: 13px; padding: 8px 14px; border-radius: 10px; }
  .lg { font-size: 16px; padding: 14px 24px; border-radius: 16px; }
  .lbl { font-family: var(--font-display); font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); }
</style></head>
<body>
  <div class="lbl">Secondary / Ghost / Link</div>
  <div class="row">
    <button class="btn sec">Liat detail</button>
    <button class="btn ghost">Nanti aja</button>
    <button class="btn link">Pelajari cara kerja</button>
  </div>
  <div class="lbl">Sizes — sm · base · lg</div>
  <div class="row">
    <button class="btn sec sm">Liat</button>
    <button class="btn sec">Liat detail</button>
    <button class="btn sec lg">Liat detail trip</button>
  </div>
</body></html>
