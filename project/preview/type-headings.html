<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Type · Headings</title>
<style>
  body { padding: 20px 24px; gap: 6px; }
  .row { display: grid; grid-template-columns: 70px 1fr 120px; align-items: baseline; gap: 14px; padding: 4px 0; border-bottom: 1px dashed var(--border); }
  .row:last-child { border-bottom: none; }
  .lbl { font-family: var(--font-display); font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-3); }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); text-align: right; }
  .h1 { font-family: var(--font-display); font-weight: 800; font-size: 44px; letter-spacing: -0.02em; line-height: 1.05; color: var(--ejg-ink); }
  .h2 { font-family: var(--font-display); font-weight: 700; font-size: 30px; letter-spacing: -0.01em; line-height: 1.15; color: var(--ejg-ink); }
  .h3 { font-family: var(--font-display); font-weight: 700; font-size: 22px; line-height: 1.2; color: var(--ejg-ink); }
  .h4 { font-family: var(--font-display); font-weight: 600; font-size: 18px; line-height: 1.25; color: var(--ejg-ink); }
</style></head>
<body>
  <div class="row"><span class="lbl">H1</span><span class="h1">Mau ke mana nih?</span><span class="meta">44 / 800 / -0.02em</span></div>
  <div class="row"><span class="lbl">H2</span><span class="h2">Trip & glamping, tanpa ribet</span><span class="meta">30 / 700 / -0.01em</span></div>
  <div class="row"><span class="lbl">H3</span><span class="h3">Private trip ke Bromo</span><span class="meta">22 / 700</span></div>
  <div class="row"><span class="lbl">H4</span><span class="h4">Termasuk apa aja?</span><span class="meta">18 / 600</span></div>
</body></html>
