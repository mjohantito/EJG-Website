<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Accent · Api</title>
<style>
  body { padding: 20px; }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
  .sw { border-radius: 12px; padding: 10px; height: 140px; display: flex; flex-direction: column; justify-content: space-between; }
  .n { font-family: var(--font-display); font-weight: 700; font-size: 11px; }
  .h { font-family: var(--font-mono); font-size: 10px; opacity: 0.85; }
  .pri-badge {
    display: inline-block; font-family: var(--font-display); font-size: 9px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase; background: var(--ejg-ink); color: #fff;
    padding: 2px 6px; border-radius: 999px; margin-bottom: 4px; width: fit-content;
  }
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background: var(--ejg-api-50); color: var(--ejg-api-600);"><span class="n">50</span><span class="h">#FFF1E6</span></div>
    <div class="sw" style="background: var(--ejg-api-100); color: var(--ejg-api-600);"><span class="n">100</span><span class="h">#FFDAB8</span></div>
    <div class="sw" style="background: var(--ejg-api-200); color: var(--ejg-api-600);"><span class="n">200</span><span class="h">#FFB77A</span></div>
    <div class="sw" style="background: var(--ejg-api-300); color: #fff;"><span class="n">300</span><span class="h">#FF9240</span></div>
    <div class="sw" style="background: var(--ejg-api-400); color: #fff;"><div><span class="pri-badge">Accent</span><div class="n">400</div></div><span class="h">#F26A1E</span></div>
    <div class="sw" style="background: var(--ejg-api-600); color: #fff;"><span class="n">600</span><span class="h">#A53C08</span></div>
  </div>
</body></html>
