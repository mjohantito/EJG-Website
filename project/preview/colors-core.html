<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Core four</title>
<style>
  body { padding: 20px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .sw { border-radius: 16px; padding: 14px; height: 160px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid var(--border); }
  .label { font-family: var(--font-display); font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.8; }
  .n { font-family: var(--font-display); font-weight: 800; font-size: 18px; letter-spacing: -0.015em; }
  .meta { font-family: var(--font-mono); font-size: 11px; opacity: 0.75; }
  .use { font-size: 11px; line-height: 1.3; opacity: 0.82; }
  .dark { color: var(--ejg-ink); }
  .light { color: var(--ejg-kertas); }
</style></head>
<body>
  <div class="row">
    <div class="sw dark" style="background: var(--ejg-ink); color: var(--ejg-kertas); border-color: transparent;">
      <span class="label">Primary</span>
      <div><div class="n">ink</div><div class="meta">#252525</div></div>
      <div class="use">Type, CTAs, logo, nav.</div>
    </div>
    <div class="sw dark" style="background: #F3D543; border-color: transparent;">
      <span class="label">Accent</span>
      <div><div class="n">matahari</div><div class="meta">#F3D543</div></div>
      <div class="use">Hero blocks, highlights, button text on ink.</div>
    </div>
    <div class="sw dark" style="background: var(--ejg-kertas);">
      <span class="label" style="opacity:0.65">Background</span>
      <div><div class="n">kertas</div><div class="meta">#EEEAE2</div></div>
      <div class="use">Default page bg.</div>
    </div>
    <div class="sw dark" style="background: var(--ejg-putih);">
      <span class="label" style="opacity:0.65">Surface</span>
      <div><div class="n">putih</div><div class="meta">#FFFFFF</div></div>
      <div class="use">Cards on kertas.</div>
    </div>
  </div>
</body></html>
