<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Mobile nav</title>
<style>
  body { padding: 20px; background: var(--ejg-kertas-2); gap: 14px; }
  .lbl { font-family: var(--font-display); font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); }
  .topnav { display: flex; align-items: center; justify-content: space-between; background: rgba(238,234,226,0.85); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 1px solid var(--border); border-radius: 20px; padding: 10px 14px; }
  .topnav img { width: 26px; height: 30px; }
  .topnav .brand { font-family: var(--font-display); font-weight: 800; font-size: 14px; letter-spacing: -0.01em; margin-left: 8px; color: var(--ejg-ink); display: flex; align-items: center; gap: 10px; }
  .iconbtn { width: 36px; height: 36px; border-radius: 999px; background: #fff; border: 1px solid var(--border); display: grid; place-items: center; color: var(--ejg-ink); }
  .iconbtn.pri { background: var(--ejg-ink); color: var(--ejg-kertas); border-color: var(--ejg-ink); }

  .bottomnav { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; background: #fff; border: 1px solid var(--border); border-radius: 28px; padding: 8px; box-shadow: 0 8px 20px rgba(37,37,37,0.08); align-items: center; }
  .item { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 4px; font-family: var(--font-display); font-size: 10px; font-weight: 600; color: var(--fg-3); gap: 5px; border-radius: 18px; }
  .item.on { background: #252525; color: #F3D543; font-weight: 800; }
  .item.on .ic { stroke-width: 2.5; }
  .ic { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
</style></head>
<body>
  <div class="lbl">Sticky top nav (mobile, blurred)</div>
  <div class="topnav">
    <div class="brand"><img src="../assets/ejg-mark-primary.svg" alt=""><span>EH! JADI GA?</span></div>
    <div style="display:flex; gap: 8px;">
      <div class="iconbtn"><svg class="ic" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg></div>
      <div class="iconbtn pri"><svg class="ic" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10"/></svg></div>
    </div>
  </div>
  <div class="lbl">Bottom tab bar (mobile)</div>
  <div class="bottomnav">
    <div class="item on"><svg class="ic" viewBox="0 0 24 24"><path d="M3 11 12 4l9 7v9a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1z"/></svg>Home</div>
    <div class="item"><svg class="ic" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>Jelajah</div>
    <div class="item"><svg class="ic" viewBox="0 0 24 24"><path d="M8 2v4M16 2v4M3 9h18M5 5h14a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2z"/></svg>Booking</div>
    <div class="item"><svg class="ic" viewBox="0 0 24 24"><path d="M20.84 4.6a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.07a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>Simpan</div>
    <div class="item"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 22a8 8 0 0 1 16 0"/></svg>Akun</div>
  </div>
</body></html>
