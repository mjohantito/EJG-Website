<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Yellow scale</title>
<style>
  body { padding: 20px; }
  .row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .sw { border-radius: 12px; padding: 10px; height: 140px; display: flex; flex-direction: column; justify-content: space-between; color: var(--ejg-ink); }
  .n { font-family: var(--font-display); font-weight: 700; font-size: 11px; }
  .h { font-family: var(--font-mono); font-size: 10px; opacity: 0.8; }
  .pri-badge { display: inline-block; font-family: var(--font-display); font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; background: var(--ejg-ink); color: #fff; padding: 2px 6px; border-radius: 999px; margin-bottom: 4px; width: fit-content; }
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background: #FEFAE0;"><span class="n">50</span><span class="h">#FEFAE0</span></div>
    <div class="sw" style="background: #FBF0A8;"><span class="n">100</span><span class="h">#FBF0A8</span></div>
    <div class="sw" style="background: #F9E777;"><span class="n">200</span><span class="h">#F9E777</span></div>
    <div class="sw" style="background: #F3D543;"><div><span class="pri-badge">Brand</span><div class="n">300</div></div><span class="h">#F3D543</span></div>
    <div class="sw" style="background: #DDBD1E;"><span class="n">400</span><span class="h">#DDBD1E</span></div>
    <div class="sw" style="background: #A68A0F; color: #FEFAE0;"><span class="n">500</span><span class="h">#A68A0F</span></div>
    <div class="sw" style="background: #6E5A08; color: #FEFAE0;"><span class="n">600</span><span class="h">#6E5A08</span></div>
  </div>
</body></html>
