<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Iconography</title>
<style>
  body { padding: 22px; gap: 10px; }
  .lbl { font-family: var(--font-display); font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); }
  .row { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; }
  .tile { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 10px 6px; border-radius: 12px; background: #fff; border: 1px solid var(--border); }
  .ic { width: 24px; height: 24px; stroke: var(--ejg-ink); fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
  .name { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
  .note { font-size: 12px; color: var(--fg-3); }
</style></head>
<body>
  <div class="lbl">Icon set: Lucide (substituted — see ICONOGRAPHY)</div>
  <div class="row">
    <div class="tile"><svg class="ic" viewBox="0 0 24 24"><path d="m8 3 4 8 5-5 5 15H2z"/></svg><span class="name">mountain</span></div>
    <div class="tile"><svg class="ic" viewBox="0 0 24 24"><path d="M12 3 4 21h16z"/><path d="M12 3v18"/><path d="m9 21 3-5 3 5"/></svg><span class="name">tent</span></div>
    <div class="tile"><svg class="ic" viewBox="0 0 24 24"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg><span class="name">campfire</span></div>
    <div class="tile"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 0-8 8c0 5 8 12 8 12s8-7 8-12a8 8 0 0 0-8-8z"/></svg><span class="name">pin</span></div>
    <div class="tile"><svg class="ic" viewBox="0 0 24 24"><path d="M8 2v4M16 2v4M3 9h18M5 5h14a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2z"/></svg><span class="name">calendar</span></div>
    <div class="tile"><svg class="ic" viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/><circle cx="17" cy="10" r="3"/><path d="M2 22a7 7 0 0 1 14 0M14 22a5 5 0 0 1 9 0"/></svg><span class="name">group</span></div>
    <div class="tile"><svg class="ic" viewBox="0 0 24 24"><path d="M3 11h18l-2 9H5zM7 11V7a5 5 0 0 1 10 0v4"/></svg><span class="name">bag</span></div>
    <div class="tile"><svg class="ic" viewBox="0 0 24 24"><path d="M3 7h13l5 5v5h-2a3 3 0 0 1-6 0H9a3 3 0 0 1-6 0z"/></svg><span class="name">van</span></div>
    <div class="tile"><svg class="ic" viewBox="0 0 24 24"><path d="M20.84 4.6a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.07a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><span class="name">heart</span></div>
  </div>
  <div class="note">24×24 · 1.75px · rounded caps · <code>currentColor</code></div>
</body></html>
